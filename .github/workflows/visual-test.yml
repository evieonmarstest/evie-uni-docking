name: Visual Browser Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run real browser visual test
        run: npm test

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evie-uni-docking-visual-test-results
          path: |
            test-results
            playwright-report
